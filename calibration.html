<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheel Calibration</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1a1a2e;
    color: #fff;
    font-family: system-ui, sans-serif;
  }
  .wheel-container {
    position: relative;
    display: inline-block;
    width: 400px;
    height: calc(400px * 1000 / 778);
  }
  .wheel-container img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  #wheel {
    transform-origin: 49.5% 52.8%;
    transition: transform 0.1s linear;
  }
  #frame {
    pointer-events: none;
    z-index: 1;
  }
  .controls {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
  }
  .angle-display {
    font-size: 48px;
    font-weight: bold;
    font-variant-numeric: tabular-nums;
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 15px;
  }
  input[type="range"] {
    width: 400px;
    accent-color: #e94560;
  }
  .buttons {
    display: flex;
    gap: 10px;
  }
  button {
    padding: 10px 24px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #e94560;
    color: #fff;
    font-weight: bold;
  }
  button:hover { background: #c73a52; }
  .info {
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.7;
    text-align: center;
    max-width: 500px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<h1 style="margin-bottom: 20px;">Wheel Calibration Tool</h1>

<div class="wheel-container">
  <img id="wheel" src="wheel.png" alt="Spinning Wheel">
  <img id="frame" src="wheel_frame.png" alt="Wheel Frame">
</div>

<div class="controls">
  <div class="angle-display" id="angleDisplay">0.0&deg;</div>
  <div class="slider-row">
    <span>0&deg;</span>
    <input type="range" id="angleSlider" min="0" max="360" step="0.1" value="0">
    <span>360&deg;</span>
  </div>
  <div class="buttons">
    <button onclick="setAngle(0)">Reset (0&deg;)</button>
    <button onclick="nudge(-1)">-1&deg;</button>
    <button onclick="nudge(-0.1)">-0.1&deg;</button>
    <button onclick="nudge(0.1)">+0.1&deg;</button>
    <button onclick="nudge(1)">+1&deg;</button>
  </div>
</div>

<div class="info">
  Use the slider or buttons to rotate the wheel. Find the <strong>left edge</strong> and <strong>right edge</strong>
  of the winning segment (the segment that the top pointer should land on to win). Note those two angles.
  <br><br>
  The wheel rotates clockwise. 0&deg; is the original position (no rotation).
</div>

<script>
  const wheel = document.getElementById('wheel');
  const slider = document.getElementById('angleSlider');
  const display = document.getElementById('angleDisplay');

  let currentAngle = 0;

  function updateWheel() {
    wheel.style.transform = `rotate(${currentAngle}deg)`;
    display.textContent = `${currentAngle.toFixed(1)}\u00B0`;
    slider.value = ((currentAngle % 360) + 360) % 360;
  }

  slider.addEventListener('input', () => {
    currentAngle = parseFloat(slider.value);
    updateWheel();
  });

  function setAngle(a) {
    currentAngle = a;
    updateWheel();
  }

  function nudge(delta) {
    currentAngle = Math.round((currentAngle + delta) * 10) / 10;
    if (currentAngle < 0) currentAngle += 360;
    if (currentAngle >= 360) currentAngle -= 360;
    updateWheel();
  }
</script>

</body>
</html>
