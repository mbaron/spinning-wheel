<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spinning Wheel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1a1a2e;
    color: #fff;
    font-family: system-ui, sans-serif;
    overflow: hidden;
  }

  .wheel-container {
    position: relative;
    display: inline-block;
    margin-bottom: 30px;
    width: 420px;
    /* Maintain aspect ratio: 1000/778 */
    height: calc(420px * 1000 / 778);
  }

  .wheel-container img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  #wheel {
    /* Rotation center: 49.5% 52.8% of the image */
    transform-origin: 49.5% 52.8%;
    cursor: grab;
  }

  #wheel.dragging {
    cursor: grabbing;
  }

  #frame {
    pointer-events: none;
    z-index: 1;
  }

  #spinBtn {
    padding: 16px 64px;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    background: linear-gradient(135deg, #e94560, #ff6b6b);
    color: #fff;
    box-shadow: 0 6px 24px rgba(233, 69, 96, 0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #spinBtn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(233, 69, 96, 0.55);
  }
  #spinBtn:active:not(:disabled) {
    transform: translateY(0);
  }
  #spinBtn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Comic popup */
  #comicPopup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 999;
  }

  #comicPopup .comic-burst {
    position: relative;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 500px;
    height: 500px;
  }

  #comicPopup .comic-burst.show {
    display: flex;
    animation: comicPop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
               comicFade 0.4s ease-in 2.2s forwards;
  }

  #comicPopup .burst-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  #comicPopup .comic-word {
    position: relative;
    font-family: 'Impact', 'Arial Black', sans-serif;
    font-size: 72px;
    font-weight: 900;
    letter-spacing: 4px;
    -webkit-text-stroke: 3px #000;
    paint-order: stroke fill;
    text-transform: uppercase;
    z-index: 1;
    line-height: 1;
  }

  #comicPopup .comic-sub {
    position: relative;
    font-family: 'Impact', 'Arial Black', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #000;
    z-index: 1;
    margin-top: 4px;
    letter-spacing: 2px;
  }

  @keyframes comicPop {
    0% {
      transform: scale(0) rotate(var(--pop-rot, -15deg));
      opacity: 0;
    }
    60% {
      transform: scale(1.15) rotate(calc(var(--settle-rot, 3deg) * -0.5));
      opacity: 1;
    }
    80% {
      transform: scale(0.95) rotate(var(--settle-rot, 3deg));
      opacity: 1;
    }
    100% {
      transform: scale(1) rotate(var(--settle-rot, 0deg));
      opacity: 1;
    }
  }

  @keyframes comicFade {
    0% {
      transform: scale(1) rotate(var(--settle-rot, 0deg));
      opacity: 1;
    }
    100% {
      transform: scale(var(--exit-scale, 1.3)) rotate(var(--exit-rot, 5deg));
      opacity: 0;
    }
  }

  /* Confetti canvas */
  #confettiCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1000;
  }
</style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>

<div id="comicPopup">
  <div class="comic-burst" id="comicBurst">
    <svg class="burst-bg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <polygon id="burstShape" points=""
        stroke="#000" stroke-width="3" stroke-linejoin="round"/>
    </svg>
    <span class="comic-word" id="comicWord"></span>
    <span class="comic-sub" id="comicSub"></span>
  </div>
</div>

<div class="wheel-container">
  <img id="wheel" src="wheel.png" alt="Spinning Wheel">
  <img id="frame" src="wheel_frame.png" alt="Wheel Frame">
</div>

<button id="spinBtn">Spin</button>

<script>
(() => {
  const wheel = document.getElementById('wheel');
  const container = document.querySelector('.wheel-container');
  const btn = document.getElementById('spinBtn');
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');

  // --- CONFIG ---
  const WIN_ANGLE_MIN = 351.8;
  const WIN_ANGLE_MAX = 6.0;
  // Rotation center as fraction of the container
  const ORIGIN_X = 0.495;
  const ORIGIN_Y = 0.528;
  // Friction: velocity multiplier per frame (~60fps). Lower = stops faster.
  const FRICTION = 0.985;
  // Minimum velocity (deg/frame) to keep spinning
  const MIN_VELOCITY = 0.1;

  // --- STATE ---
  let currentAngle = 0;
  let spinning = false;  // true during button-spin or momentum coast
  let dragging = false;
  let velocity = 0;      // degrees per frame
  // Track recent drag samples for velocity calculation
  let dragSamples = [];

  function normalizeAngle(a) {
    return ((a % 360) + 360) % 360;
  }

  function applyAngle() {
    wheel.style.transform = `rotate(${currentAngle}deg)`;
  }

  // --- Get the wheel center in page coordinates ---
  function getWheelCenter() {
    const rect = container.getBoundingClientRect();
    return {
      x: rect.left + rect.width * ORIGIN_X,
      y: rect.top + rect.height * ORIGIN_Y,
    };
  }

  // --- Angle from center to a point (in degrees, 0=up, clockwise) ---
  function angleToPoint(cx, cy, px, py) {
    return Math.atan2(px - cx, -(py - cy)) * (180 / Math.PI);
  }

  // =====================
  // BUTTON SPIN
  // =====================
  function buttonSpin() {
    if (spinning || dragging) return;
    spinning = true;
    btn.disabled = true;

    const totalDuration = 5000 + Math.random() * 2000;
    const fullTurns = 5 + Math.floor(Math.random() * 4);
    const extraAngle = Math.random() * 360;
    const totalRotation = fullTurns * 360 + extraAngle;
    const windupDuration = totalDuration * 0.08;
    const windupAngle = -(15 + Math.random() * 10);
    const spinDuration = totalDuration - windupDuration;
    const startTime = performance.now();
    const startAngle = currentAngle;

    function animate(now) {
      const elapsed = now - startTime;
      if (elapsed < windupDuration) {
        const t = elapsed / windupDuration;
        const eased = t * (2 - t);
        currentAngle = startAngle + windupAngle * eased;
      } else if (elapsed < totalDuration) {
        const spinElapsed = elapsed - windupDuration;
        const t = spinElapsed / spinDuration;
        const eased = 1 - Math.pow(1 - t, 3);
        currentAngle = startAngle + windupAngle + totalRotation * eased;
      } else {
        currentAngle = normalizeAngle(startAngle + windupAngle + totalRotation);
        applyAngle();
        spinning = false;
        btn.disabled = false;
        if (isWinningAngle(currentAngle)) launchConfetti();
        else showComicLose();
        return;
      }
      applyAngle();
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  }

  btn.addEventListener('click', buttonSpin);

  // =====================
  // DRAG-TO-SPIN
  // =====================
  function onPointerDown(e) {
    if (spinning) return;
    e.preventDefault();
    dragging = true;
    velocity = 0;
    dragSamples = [];
    wheel.classList.add('dragging');

    const center = getWheelCenter();
    const startPointerAngle = angleToPoint(center.x, center.y, e.clientX, e.clientY);
    const startWheelAngle = currentAngle;

    function onPointerMove(e) {
      if (!dragging) return;
      const center = getWheelCenter();
      const pointerAngle = angleToPoint(center.x, center.y, e.clientX, e.clientY);
      let delta = pointerAngle - startPointerAngle;
      // Unwrap so we don't jump at the +-180 boundary
      if (delta > 180) delta -= 360;
      if (delta < -180) delta += 360;
      currentAngle = startWheelAngle + delta;
      applyAngle();

      // Record sample for velocity
      const now = performance.now();
      dragSamples.push({ angle: currentAngle, time: now });
      // Keep only last 80ms of samples
      while (dragSamples.length > 1 && now - dragSamples[0].time > 80) {
        dragSamples.shift();
      }
    }

    function onPointerUp(e) {
      if (!dragging) return;
      dragging = false;
      wheel.classList.remove('dragging');
      document.removeEventListener('pointermove', onPointerMove);
      document.removeEventListener('pointerup', onPointerUp);

      // Calculate release velocity from recent samples
      if (dragSamples.length >= 2) {
        const first = dragSamples[0];
        const last = dragSamples[dragSamples.length - 1];
        const dt = last.time - first.time;
        if (dt > 0) {
          let angleDiff = last.angle - first.angle;
          // deg/ms -> deg/frame (assuming ~16.67ms per frame)
          velocity = (angleDiff / dt) * 16.67;
        }
      }

      // If there's meaningful velocity, coast with friction
      if (Math.abs(velocity) > MIN_VELOCITY) {
        spinning = true;
        btn.disabled = true;
        requestAnimationFrame(coastAnimate);
      } else {
        // Dropped with no momentum: check win at current position
        currentAngle = normalizeAngle(currentAngle);
        applyAngle();
        if (isWinningAngle(currentAngle)) launchConfetti();
        else showComicLose();
      }
    }

    document.addEventListener('pointermove', onPointerMove);
    document.addEventListener('pointerup', onPointerUp);
  }

  wheel.addEventListener('pointerdown', onPointerDown);
  // Prevent image drag
  wheel.addEventListener('dragstart', e => e.preventDefault());

  // --- Coast animation (after drag release) ---
  function coastAnimate() {
    if (!spinning) return;

    currentAngle += velocity;
    velocity *= FRICTION;
    applyAngle();

    if (Math.abs(velocity) < MIN_VELOCITY) {
      // Stopped
      velocity = 0;
      currentAngle = normalizeAngle(currentAngle);
      applyAngle();
      spinning = false;
      btn.disabled = false;
      if (isWinningAngle(currentAngle)) launchConfetti();
      else showComicLose();
      return;
    }

    requestAnimationFrame(coastAnimate);
  }

  // =====================
  // WIN CHECK
  // =====================
  function isWinningAngle(angle) {
    if (WIN_ANGLE_MIN > WIN_ANGLE_MAX) {
      return angle >= WIN_ANGLE_MIN || angle <= WIN_ANGLE_MAX;
    }
    return angle >= WIN_ANGLE_MIN && angle <= WIN_ANGLE_MAX;
  }

  // =====================
  // COMIC POPUP (win + lose)
  // =====================
  // Each entry has a list of emojis; one is picked at random and appended to sub
  const LOSE_WORDS = [
    { word: 'NOPE!', sub: 'Try again!', emojis: ['\u{1F645}', '\u{274C}', '\u{1F6AB}', '\u{1F44E}'] },
    { word: 'BONK!', sub: 'So close!', emojis: ['\u{1F4A5}', '\u{1F528}', '\u{1F62C}', '\u{1F635}'] },
    { word: 'WOMP!', sub: 'Not this time!', emojis: ['\u{1F4E2}', '\u{1F61E}', '\u{1F625}', '\u{1F62D}'] },
    { word: 'ZONK!', sub: 'Spin again!', emojis: ['\u{1F4AB}', '\u{1F300}', '\u{1F636}', '\u{1F62E}'] },
    { word: 'OOPS!', sub: 'Almost!', emojis: ['\u{1F648}', '\u{1F605}', '\u{1F937}', '\u{1F926}'] },
    { word: 'RATS!', sub: 'Maybe next time!', emojis: ['\u{1F400}', '\u{1F614}', '\u{1F61F}', '\u{1F6A9}'] },
    { word: 'WHAM!', sub: 'Nope!', emojis: ['\u{1F4A2}', '\u{1F44A}', '\u{1F4A8}', '\u{26A1}'] },
    { word: 'POW!', sub: 'Try again!', emojis: ['\u{1F4A5}', '\u{1F94A}', '\u{1F525}', '\u{2B50}'] },
    { word: 'SPLAT!', sub: 'Better luck next spin!', emojis: ['\u{1F95A}', '\u{1F4A6}', '\u{1F346}', '\u{1F61D}'] },
    { word: 'YIKES!', sub: 'Not even close!', emojis: ['\u{1F631}', '\u{1F640}', '\u{1F62B}', '\u{1F4A9}'] },
    { word: 'FLOP!', sub: 'One more?', emojis: ['\u{1F41F}', '\u{1F60F}', '\u{1F938}', '\u{1F610}'] },
  ];

  const WIN_WORDS = [
    { word: 'WINNER!', sub: 'Back to work...', emojis: ['\u{1F3C6}', '\u{1F947}', '\u{1F451}', '\u{2728}'] },
    { word: 'JACKPOT!', sub: '...just kidding, keep working', emojis: ['\u{1F3B0}', '\u{1F4B0}', '\u{1F911}', '\u{1F4B8}'] },
    { word: 'CONGRATS!', sub: "Break's over!", emojis: ['\u{1F389}', '\u{23F0}', '\u{1F6CC}', '\u{1F634}'] },
    { word: 'FREEDOM!', sub: '...for 5 seconds', emojis: ['\u{1F985}', '\u{26F3}', '\u{1F3D6}\u{FE0F}', '\u{1F5FD}'] },
    { word: 'VICTORY!', sub: 'Nice try, back to the grind', emojis: ['\u{2696}\u{FE0F}', '\u{1F4BB}', '\u{1F62E}\u200D\u{1F4A8}', '\u{1F9D1}\u200D\u{1F4BB}'] },
    { word: 'YES!', sub: "Too bad there's still that Linear ticket", emojis: ['\u{1F3AB}', '\u{1F4CB}', '\u{1F4DD}', '\u{1F62C}'] },
    { word: 'WOOHOO!', sub: "Don't get used to it", emojis: ['\u{1F38A}', '\u{1F973}', '\u{1F643}', '\u{1F61C}'] },
    { word: 'BINGO!', sub: 'Anyway... back to work', emojis: ['\u{1F3B2}', '\u{1F4BC}', '\u{1F468}\u200D\u{1F4BB}', '\u{2615}'] },
    { word: 'BOOM!', sub: "HR won't approve this break", emojis: ['\u{1F4A3}', '\u{1F913}', '\u{1F4C9}', '\u{1F9FE}'] },
    { word: 'WOW!', sub: 'Deploy is still pending though', emojis: ['\u{1F680}', '\u{1F6A8}', '\u{1F914}', '\u{1F4E6}'] },
  ];

  const LOSE_COLORS = [
    { bg: '#feca57', text: '#e94560' },
    { bg: '#ff6b6b', text: '#fff' },
    { bg: '#48dbfb', text: '#e94560' },
    { bg: '#ff9ff3', text: '#2d3436' },
    { bg: '#54a0ff', text: '#fff' },
    { bg: '#ff6348', text: '#fff' },
    { bg: '#f368e0', text: '#fff' },
    { bg: '#fd79a8', text: '#fff' },
    { bg: '#e17055', text: '#fff' },
  ];

  const WIN_COLORS = [
    { bg: '#2ecc71', text: '#fff' },
    { bg: '#00b894', text: '#fff' },
    { bg: '#feca57', text: '#2d3436' },
    { bg: '#55efc4', text: '#2d3436' },
    { bg: '#00cec9', text: '#fff' },
  ];

  const burst = document.getElementById('comicBurst');
  const burstShape = document.getElementById('burstShape');
  const comicWord = document.getElementById('comicWord');
  const comicSub = document.getElementById('comicSub');
  let comicTimeout = null;

  function randRange(min, max) {
    return min + Math.random() * (max - min);
  }

  // Generate a starburst polygon with random spike count and slight jitter
  function generateBurst() {
    const cx = 100, cy = 100;
    const spikes = [8, 10, 12, 14][Math.floor(Math.random() * 4)];
    const outerR = 98;
    const innerR = randRange(55, 70); // valley depth varies
    const points = [];
    const totalPts = spikes * 2;
    const angleStep = (Math.PI * 2) / totalPts;
    const offsetAngle = randRange(0, angleStep); // random starting rotation

    for (let i = 0; i < totalPts; i++) {
      const angle = offsetAngle + i * angleStep - Math.PI / 2;
      const isOuter = i % 2 === 0;
      const r = isOuter
        ? outerR + randRange(-4, 4)
        : innerR + randRange(-6, 6);
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      points.push(`${x.toFixed(1)},${y.toFixed(1)}`);
    }
    return points.join(' ');
  }

  function showComic(words, colors) {
    const pick = words[Math.floor(Math.random() * words.length)];
    const color = colors[Math.floor(Math.random() * colors.length)];
    const emoji = pick.emojis[Math.floor(Math.random() * pick.emojis.length)];

    comicWord.textContent = pick.word;
    comicWord.style.color = color.text;
    comicSub.textContent = pick.sub + ' ' + emoji;
    burstShape.setAttribute('fill', color.bg);
    burstShape.setAttribute('points', generateBurst());

    // Randomize the pop-in rotation for variety
    const popRotation = randRange(-20, 20);
    const settleRotation = randRange(-5, 5);
    const exitRotation = randRange(-10, 10);
    const exitScale = randRange(1.2, 1.5);
    burst.style.setProperty('--pop-rot', popRotation + 'deg');
    burst.style.setProperty('--settle-rot', settleRotation + 'deg');
    burst.style.setProperty('--exit-rot', exitRotation + 'deg');
    burst.style.setProperty('--exit-scale', exitScale);

    // Reset animation
    if (comicTimeout) clearTimeout(comicTimeout);
    burst.classList.remove('show');
    void burst.offsetWidth;
    burst.classList.add('show');

    comicTimeout = setTimeout(() => {
      burst.classList.remove('show');
      comicTimeout = null;
    }, 2700);
  }

  function showComicLose() {
    showComic(LOSE_WORDS, LOSE_COLORS);
  }

  function showComicWin() {
    showComic(WIN_WORDS, WIN_COLORS);
  }

  // =====================
  // CONFETTI
  // =====================
  function launchConfetti() {
    showComicWin();
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const pieces = [];
    const colors = ['#e94560', '#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#01a3a4', '#f368e0', '#ff6348'];
    const PIECE_COUNT = 200;

    for (let i = 0; i < PIECE_COUNT; i++) {
      pieces.push({
        x: canvas.width / 2 + (Math.random() - 0.5) * 200,
        y: canvas.height / 2,
        vx: (Math.random() - 0.5) * 20,
        vy: -Math.random() * 18 - 5,
        w: 6 + Math.random() * 8,
        h: 4 + Math.random() * 6,
        color: colors[Math.floor(Math.random() * colors.length)],
        rotation: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 15,
        gravity: 0.25 + Math.random() * 0.15,
        opacity: 1,
        decay: 0.003 + Math.random() * 0.003,
      });
    }

    function drawConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      for (const p of pieces) {
        if (p.opacity <= 0) continue;
        alive = true;
        p.x += p.vx;
        p.vy += p.gravity;
        p.y += p.vy;
        p.vx *= 0.99;
        p.rotation += p.rotSpeed;
        p.opacity -= p.decay;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate((p.rotation * Math.PI) / 180);
        ctx.globalAlpha = Math.max(0, p.opacity);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      }
      if (alive) {
        requestAnimationFrame(drawConfetti);
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }
    drawConfetti();
  }

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
})();
</script>

</body>
</html>
